<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <nav>
        <a href="{{ '/' | relative_url }}" class="logo">BD</a>
        <div class="nav-links">
            <a href="{{ '/' | relative_url }}">Home</a>
            <a href="{{ '/about' | relative_url }}">About</a>
            <a href="{{ '/professional' | relative_url }}">Professional</a>
            <a href="{{ '/academic' | relative_url }}">Academic</a>
            <a href="{{ '/extracurricular' | relative_url }}">Extracurricular</a>
            <a href="{{ '/connect' | relative_url }}">Connect</a>
        </div>
        <button id="theme-toggle" aria-label="Toggle Dark Mode">☾</button>
    </nav>

    <main>
        {{ content }}
    </main>

    <script>
        const toggleButton = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('theme') || 'light';
        
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            toggleButton.textContent = '☼';
        }

        toggleButton.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                toggleButton.textContent = '☾';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                toggleButton.textContent = '☼';
            }
        });
    </script>
</body>
</html>
