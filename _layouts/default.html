<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <nav>
        <a href="{{ '/' | relative_url }}" class="logo">BD</a>
        <div class="nav-links">
            <a href="{{ '/' | relative_url }}">Home</a>
            <a href="{{ '/about' | relative_url }}">About</a>
            <a href="{{ '/professional' | relative_url }}">Professional</a>
            <a href="{{ '/academic' | relative_url }}">Academic</a>
            <a href="{{ '/extracurricular' | relative_url }}">Extracurricular</a>
            <a href="{{ '/connect' | relative_url }}">Connect</a>
        </div>
        <button id="theme-toggle" aria-label="Toggle Dark Mode">☾</button>
    </nav>

    <main>
        {{ content }}
    </main>

    <footer class="site-footer">

        <div class="footer-left">

            <img src="{{ '/assets/img/profile.png' | relative_url }}" alt="Bronson Dubey" class="footer-pic">

            <div class="footer-info">

                <h3>Bronson Dubey</h3>

                <p class="footer-title">Economics & Data Analytics Student</p>

                <p class="footer-copy">&copy; 2026 - <a href="https://github.com/bxdubey/bxdubey.github.io" target="_blank">Source</a></p>

            </div>

        </div>



        <div class="footer-explore">

            <h4>EXPLORE</h4>

            <div class="explore-grid">

                <a href="{{ '/about' | relative_url }}">About</a>

                <a href="{{ '/professional' | relative_url }}">Professional</a>

                <a href="{{ '/academic' | relative_url }}">Academic</a>

                <a href="{{ '/extracurricular' | relative_url }}">Extracurricular</a>

            </div>

        </div>



        <div class="footer-connect">

            <h4>CONNECT</h4>

            <div class="connect-icons">

                <a href="https://www.linkedin.com/in/bronson-dubey/" target="_blank" class="footer-icon">

                    <svg viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>

                </a>

                <a href="{{ '/connect' | relative_url }}" class="footer-icon">

                    <svg viewBox="0 0 24 24"><path d="M0 3v18h24v-18h-24zm6.623 7.929l-4.623 5.712v-9.458l4.623 3.746zm-4.141-5.929h19.035l-9.517 7.713-9.518-7.713zm5.694 7.188l3.824 3.099 3.83-3.104 5.612 6.817h-18.866l5.6-6.812zm9.208-1.264l4.616-3.741v9.348l-4.616-5.607z"/></svg>

                </a>

            </div>

        </div>

    </footer>

    <script>
        const toggleButton = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('theme') || 'light';
        
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            toggleButton.textContent = '☼';
        }

        toggleButton.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                toggleButton.textContent = '☾';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                toggleButton.textContent = '☼';
            }
        });
    </script>
</body>
</html>
